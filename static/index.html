<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>옵션 프리미엄 분석</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0d0f;color:#f0f0f5;font-family:'Segoe UI',sans-serif;font-size:14px;}
.topbar{background:#13131a;border-bottom:1px solid #2a2a3a;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
.brand{font-size:16px;font-weight:800;color:#f0a040;}
.input-group{display:flex;gap:8px;flex:1;max-width:380px;margin-left:auto;}
.input-group input{flex:1;background:#1a1a24;border:1px solid #333348;color:#fff;padding:9px 14px;border-radius:8px;font-size:13px;outline:none;}
.input-group input:focus{border-color:#e07020;}
.input-group input::placeholder{color:#707080;}
.btn{background:linear-gradient(135deg,#e07020,#c05010);color:#fff;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;}
.btn:disabled{background:#333;color:#666;cursor:not-allowed;}
.main{padding:16px 20px;}
.placeholder{text-align:center;padding:60px 20px;color:#555;}
.loading{display:none;text-align:center;padding:60px;}
.loading.on{display:block;}
.spinner{width:40px;height:40px;border:3px solid #2a2a3a;border-top-color:#e07020;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.dash{display:none;}
.dash.on{display:block;}
.d-head{background:linear-gradient(135deg,#1a1a24 0%,#1a1208 100%);border:1px solid #2a2a3a;border-radius:12px;padding:16px 20px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.d-head h2{font-size:18px;font-weight:800;color:#f0f0f5;margin-bottom:3px;}
.d-head p{font-size:12px;color:#707080;}
.d-pill{background:rgba(224,112,32,.15);border:1px solid #e07020;color:#f0a040;padding:6px 16px;border-radius:20px;font-size:14px;font-weight:800;}
.top-row{display:grid;grid-template-columns:220px 1fr;gap:12px;margin-bottom:14px;}
.gauge-box{background:#1a1a24;border:1px solid #2a2a3a;border-radius:12px;padding:18px 16px;display:flex;flex-direction:column;align-items:center;}
.gauge-lbl{font-size:11px;color:#707080;margin-bottom:8px;text-align:center;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.g-score{font-size:54px;font-weight:900;line-height:1;margin-top:-4px;}
.g-sub{font-size:11px;color:#707080;margin-top:4px;}
.g-verdict{margin-top:10px;padding:5px 16px;border-radius:20px;font-size:13px;font-weight:700;border:1px solid;}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:8px;}
.mc{background:#1a1a24;border:1px solid #2a2a3a;border-radius:10px;padding:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.mc-lbl{font-size:11px;color:#707080;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.mc-val{font-size:28px;font-weight:800;color:#f0f0f5;line-height:1.1;}
.mc-sub{font-size:11px;color:#707080;margin-top:3px;}
.mc-tag{display:inline-block;margin-top:6px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;}
.tag-red{color:#ff4a30;background:rgba(255,74,48,.12);}
.tag-green{color:#30c070;background:rgba(48,192,112,.12);}
.tag-gray{color:#707080;background:rgba(255,255,255,.05);}
.tag-yellow{color:#f0a030;background:rgba(240,160,48,.12);}
.alert{background:rgba(255,60,20,.08);border:1px solid rgba(255,74,48,.4);border-left:3px solid #ff4a30;border-radius:10px;padding:14px 18px;margin-bottom:14px;}
.alert-head{font-size:14px;font-weight:700;color:#ff4a30;margin-bottom:6px;}
.alert-body{font-size:13px;color:#ffb090;line-height:1.7;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;align-items:start;}
.card{background:#1a1a24;border:1px solid #2a2a3a;border-radius:12px;padding:16px;min-width:0;}
.card-title{font-size:12px;font-weight:700;color:#707080;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bar-name{font-size:13px;color:#b0b0c0;width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;background:#1a1a22;border-radius:2px;height:20px;overflow:hidden;min-width:0;}
.bar-fill{height:100%;border-radius:2px;transition:width 1s ease;}
.bar-pct{font-size:13px;font-weight:700;color:#fff;width:36px;text-align:right;flex-shrink:0;}
.ovx-explain{background:rgba(224,112,32,.08);border:1px solid rgba(224,112,32,.2);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#b0b0c0;line-height:1.7;}
.ovx-explain b{color:#f0a040;}
.ovx-bar-area{display:flex;align-items:flex-end;gap:8px;height:110px;padding:0 4px;border-bottom:1px solid #333348;}
.ovx-col{display:flex;flex-direction:column;align-items:center;flex:1;min-width:0;}
.ovx-bar{width:100%;border-radius:5px 5px 0 0;min-height:4px;}
.ovx-labels{display:flex;gap:8px;padding:8px 4px 0;margin-bottom:10px;}
.ovx-label-col{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:3px;}
.ovx-num{font-size:13px;font-weight:800;text-align:center;}
.ovx-meaning{font-size:11px;font-weight:700;text-align:center;}
.ovx-event{font-size:10px;color:#707080;text-align:center;line-height:1.4;}
.commentary{background:#1a1a24;border:1px solid #2a2a3a;border-radius:12px;padding:18px 20px;margin-bottom:4px;}
.comm-title{font-size:16px;font-weight:800;color:#f0f0f5;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #2a2a3a;}
.comm-p{font-size:13px;color:#b0b0c0;line-height:1.8;margin-bottom:10px;}
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">📊 옵션 프리미엄 분석</span>
  <div class="input-group">
    <input id="q" type="text" placeholder="예: 원유 콜, 골드 풋, S&P 콜, 천연가스 풋...">
    <button class="btn" id="btn" onclick="run()">분석 실행</button>
  </div>
</div>
<div class="main">
  <div class="placeholder" id="ph">
    <div style="font-size:52px;margin-bottom:16px;">📊</div>
    <h3 style="font-size:18px;color:#b0b0c0;margin-bottom:8px;">옵션 프리미엄 분석기</h3>
    <p style="font-size:13px;color:#555;line-height:1.8;">분석하고 싶은 종목과 옵션 종류를 입력하세요.<br><br><code style="color:#f0a040;background:rgba(240,160,64,.1);border-radius:4px;padding:2px 8px;">원유 콜</code> &nbsp;<code style="color:#f0a040;background:rgba(240,160,64,.1);border-radius:4px;padding:2px 8px;">골드 풋</code> &nbsp;<code style="color:#f0a040;background:rgba(240,160,64,.1);border-radius:4px;padding:2px 8px;">S&P 콜</code> &nbsp;<code style="color:#f0a040;background:rgba(240,160,64,.1);border-radius:4px;padding:2px 8px;">천연가스 풋</code> &nbsp;<code style="color:#f0a040;background:rgba(240,160,64,.1);border-radius:4px;padding:2px 8px;">대두 콜</code> &nbsp;<code style="color:#f0a040;background:rgba(240,160,64,.1);border-radius:4px;padding:2px 8px;">호주달러 풋</code> &nbsp;<code style="color:#f0a040;background:rgba(240,160,64,.1);border-radius:4px;padding:2px 8px;">국채 콜</code></p>
  </div>
  <div class="loading" id="ld"><div class="spinner"></div><div style="color:#707080;font-size:13px;" id="ldmsg">분석 중...</div></div>
  <div class="dash" id="dash"></div>
</div>
<script>
const EVENTS={"21Q4":"오미크론\n변이 확산","22Q2":"러·우\n전쟁 발발","22Q4":"Fed\n금리 급등","23Q2":"SVB 파산\n신용위기","현재":"중동\n지정학 리스크"};
const LM=["실제 데이터 수집 중...","OVX·WTI 분석 중...","고평가 요인 계산 중...","대시보드 생성 중..."];

function ovxColor(v){
  const t=Math.min(Math.max((v-20)/55,0),1);
  return `rgb(${Math.round(160+t*80)},${Math.round(120-t*104)},16)`;
}
function ovxLevel(v){
  if(v>=50)return{label:"매우 불안"};
  if(v>=40)return{label:"불안"};
  if(v>=30)return{label:"보통"};
  return{label:"안정"};
}

async function run(){
  const q=document.getElementById("q").value.trim();
  if(!q){alert("원유 콜 또는 원유 풋을 입력해주세요.");return;}
  const isCall=q.includes("콜")||q.toLowerCase().includes("call");
  const isPut=q.includes("풋")||q.toLowerCase().includes("put");
  if(!isCall&&!isPut){alert('"원유 콜" 또는 "원유 풋"을 입력해주세요.');return;}
  const optType=isCall?"콜":"풋";
  const assetParam=encodeURIComponent(q.replace(/콜|풋|call|put/gi,'').trim()||'원유');
  document.getElementById("ph").style.display="none";
  document.getElementById("dash").classList.remove("on");
  const ld=document.getElementById("ld");ld.classList.add("on");
  document.getElementById("btn").disabled=true;
  let mi=0;
  const iv=setInterval(()=>{document.getElementById("ldmsg").textContent=LM[Math.min(mi++,LM.length-1)];},1200);
  try{
    const res=await fetch(`/analyze?option_type=${encodeURIComponent(optType)}&asset=${assetParam}`);
    if(!res.ok)throw new Error(`서버 오류: ${res.status}`);
    const d=await res.json();
    if(d.error)throw new Error(d.error);
    d.factors=Array.isArray(d.factors)&&d.factors.length?d.factors:[{name:"IV 퍼센타일",pct:70},{name:"지정학 리스크",pct:65},{name:"계절적 수요",pct:50},{name:"달러 강세",pct:45},{name:"투기 포지션",pct:40}];
    d.ovx_history=Array.isArray(d.ovx_history)&&d.ovx_history.length?d.ovx_history:[{label:"21Q4",value:32},{label:"22Q2",value:58},{label:"22Q4",value:41},{label:"23Q2",value:28},{label:"현재",value:38}];
    d.commentary=Array.isArray(d.commentary)&&d.commentary.length?d.commentary:["분석 데이터를 불러왔습니다."];
    clearInterval(iv);ld.classList.remove("on");
    render(d,optType);
  }catch(e){
    clearInterval(iv);ld.classList.remove("on");
    document.getElementById("dash").innerHTML=`<div style="background:rgba(255,0,0,.08);border:1px solid rgba(255,74,48,.4);border-radius:8px;padding:14px;color:#ff8070;font-size:13px;">⚠️ 오류: ${e.message}</div>`;
    document.getElementById("dash").classList.add("on");
  }
  document.getElementById("btn").disabled=false;
}

function render(d,optType){
  const sc=Math.min(Math.max(d.score||0,0),100);
  const scCol=sc>=70?"#ff4a30":sc>=40?"#f0a030":"#30c070";
  const tagBg=sc>=70?"rgba(255,74,48,.12)":sc>=40?"rgba(240,160,48,.12)":"rgba(48,192,112,.12)";
  const verdict=d.verdict||(sc>=70?"고평가":sc>=40?"적정":"저평가");
  const r=76,cx=90,cy=90;
  const sa=-Math.PI,ea=0,fe=sa+(ea-sa)*(sc/100);
  const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa);
  const cfx=cx+r*Math.cos(fe),cfy=cy+r*Math.sin(fe);
  const lg=(fe-sa)>Math.PI?1:0;
  const x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
  const ovx=d.ovx_history||[];
  const maxV=Math.max(...ovx.map(o=>o.value),1);
  const ovxBarDivs=ovx.map((o,i)=>{
    const isNow=o.label==="현재"||i===ovx.length-1;
    const h=Math.round((o.value/maxV)*100);
    const barCol=isNow?"#e07020":ovxColor(o.value);
    return `<div class="ovx-col"><div class="ovx-bar" style="height:${h}px;background:${barCol};${isNow?"box-shadow:0 0 10px rgba(224,112,32,.6)":""}"></div></div>`;
  }).join("");
  const ovxLabelDivs=ovx.map((o,i)=>{
    const isNow=o.label==="현재"||i===ovx.length-1;
    const lv=ovxLevel(o.value);
    const barCol=isNow?"#f0a040":ovxColor(o.value);
    const evt=(EVENTS[o.label]||o.label).split("\n");
    return `<div class="ovx-label-col"><div class="ovx-num" style="color:${barCol}">${o.value}</div><div class="ovx-meaning" style="color:${barCol}">${lv.label}</div>${evt.map(e=>`<div class="ovx-event">${e}</div>`).join("")}</div>`;
  }).join("");
  const fbars=(d.factors||[]).map(f=>{
    const t=f.pct/100;
    const barCol=`rgb(${Math.round(240-t*76)},${Math.round(160-t*144)},${Math.round(48-t*32)})`;
    return `<div class="bar-row"><div class="bar-name">${f.name}</div><div class="bar-track"><div class="bar-fill" style="width:${f.pct}%;background:${barCol}"></div></div><div class="bar-pct">${f.pct}%</div></div>`;
  }).join("");
  const ivDir=d.iv_direction||"";
  const ivCls=ivDir==="상승"?"tag-red":ivDir==="하락"?"tag-green":"tag-gray";
  const ivArrow=ivDir==="상승"?"▲ ":ivDir==="하락"?"▼ ":"→ ";
  const hv_premium=d.hv_discount??d.hv_premium??0;
  const iv_hv_ratio=d.iv_hv_ratio??d.hv_iv_ratio??1;
  document.getElementById("dash").innerHTML=`
    <div class="d-head">
      <div><h2>${d.emoji||'🛢'} ${d.asset_name||'원유'} ${d.option_type||optType} 옵션 — 프리미엄 고평가 분석</h2><p>Yahoo Finance 실제 데이터 기반 밸류에이션 판정 결과</p></div>
      <div class="d-pill">${d.option_type||optType}</div>
    </div>
    <div class="top-row">
      <div class="gauge-box">
        <div class="gauge-lbl">종합 고평가 점수</div>
        <svg width="180" height="100" viewBox="0 0 180 100">
          <path d="M${x1},${y1} A${r},${r} 0 0 1 ${x2},${y2}" fill="none" stroke="#252530" stroke-width="16" stroke-linecap="butt"/>
          <path d="M${x1},${y1} A${r},${r} 0 ${lg} 1 ${cfx},${cfy}" fill="none" stroke="${scCol}" stroke-width="16" stroke-linecap="butt"/>
        </svg>
        <div class="g-score" style="color:${scCol}">${sc}</div>
        <div class="g-sub">고평가 점수 / 100 (높을수록 고평가)</div>
        <div class="g-verdict" style="color:${scCol};background:${tagBg};border-color:${scCol}">● ${verdict} 구간</div>
      </div>
      <div class="metrics">
        <div class="mc"><div class="mc-lbl">선물 IVR</div><div class="mc-val">${d.iv_rank}</div><div class="mc-sub">IV Rank (0~100)</div><span class="mc-tag tag-red">▲ 상위권</span></div>
        <div class="mc"><div class="mc-lbl">IV 백분위</div><div class="mc-val">${d.iv_percentile}</div><div class="mc-sub">과거 대비 높은 수준</div><span class="mc-tag tag-red">▲ 과거 대비 높음</span></div>
        <div class="mc"><div class="mc-lbl">IV 방향성</div><div class="mc-val">${d.iv_direction}</div><div class="mc-sub">최근 추이</div><span class="mc-tag ${ivCls}">${ivArrow}${ivDir==="상승"?"변동성 확대":ivDir==="하락"?"변동성 축소":"횡보 중"}</span></div>
        <div class="mc"><div class="mc-lbl">HV 대비 프리미엄</div><div class="mc-val">+${hv_premium}%</div><div class="mc-sub">실제보다 비싼 정도</div><span class="mc-tag tag-yellow">▲ 프리미엄 과다</span></div>
        <div class="mc"><div class="mc-lbl">HV/IV 배율</div><div class="mc-val">${iv_hv_ratio}:1</div><div class="mc-sub">실제 변동성 대비 배율</div><span class="mc-tag tag-red">▲ 1.2 초과 고평가</span></div>
        <div class="mc"><div class="mc-lbl">콜/풋 비율</div><div class="mc-val">${d.call_put_ratio}</div><div class="mc-sub">C/P 수요 비율</div><span class="mc-tag tag-gray">● 시장 방향성</span></div>
      </div>
    </div>
    <div class="alert"><div class="alert-head">⚠️ 분석 주의사항</div><div class="alert-body">${d.alert_message}</div></div>
    <div class="two-col">
      <div class="card"><div class="card-title">고평가 요인 분석</div><div style="display:flex;flex-direction:column;gap:10px;">${fbars}</div></div>
      <div class="card">
        <div class="card-title" id="volChartTitle">시장 변동성 추이</div>
        <div class="ovx-explain" id="volExplain"></div>
        <div class="ovx-bar-area">${ovxBarDivs}</div>
        <div class="ovx-labels">${ovxLabelDivs}</div>
      </div>
    </div>
    <div class="commentary">
      <div class="comm-title">📝 ${d.commentary_title||"분석 결과"}</div>
      ${(d.commentary||[]).map(p=>`<p class="comm-p">${p}</p>`).join("")}
    </div>`;
  document.getElementById("dash").classList.add("on");
}
document.getElementById("q").addEventListener("keydown",e=>{if(e.key==="Enter")run();});
</script>
</body>
</html>
